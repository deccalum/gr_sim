source_roots:
  - src
file_extensions:
  - .h
  - .hpp
  - .cpp
  - .cu
include_paths:
  - src
output_file: physics_reference.md
math_markers:
  - "g_"
  - "Gamma"
  - "Christoffel"
  - "ds^2"
  - "metric"
  - "curvature"
include_comment_blocks: false
max_comment_lookback: 4
coord_symbols:
  0: t
  1: r
  2: theta
  3: phi
symbol_descriptions:
  M_: Schwarzschild mass parameter
  x[0]: coordinate time t
  x[1]: radial coordinate r
  x[2]: polar angle theta
  x[3]: azimuthal angle phi
